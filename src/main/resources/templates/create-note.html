<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Note – NotesApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #F0EBFF; font-family: 'Inter', sans-serif; min-height: 100vh; }

        .navbar {
            background: linear-gradient(135deg, #6C3EF4, #FF6B6B);
            padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-brand { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 20px; color: #fff; text-decoration: none; }
        .btn-back {
            background: rgba(255,255,255,0.2); color: #fff;
            font-family: 'Inter', sans-serif; font-weight: 500; font-size: 13px;
            padding: 8px 16px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.35); cursor: pointer;
            text-decoration: none; transition: opacity 0.2s;
        }
        .btn-back:hover { opacity: 0.85; }

        .content { padding: 2rem; max-width: 680px; margin: 0 auto; }

        .form-card {
            background: #fff; border-radius: 24px;
            padding: 2rem 2rem; margin-top: 1rem;
        }
        .form-card h2 {
            font-family: 'Poppins', sans-serif; font-weight: 700;
            font-size: 22px; color: #1a1a2e; margin-bottom: 0.25rem;
        }
        .form-card .subtitle { font-size: 13px; color: #aaa; margin-bottom: 1.75rem; }

        .field { margin-bottom: 1.25rem; }
        .field label { display: block; font-size: 12px; font-weight: 500; color: #555; margin-bottom: 6px; }
        .field input, .field textarea {
            width: 100%; padding: 12px 16px;
            border: 1.5px solid #e8e0ff; border-radius: 12px;
            font-family: 'Inter', sans-serif; font-size: 14px; color: #1a1a2e;
            background: #f8f5ff; outline: none; transition: all 0.2s;
            resize: vertical;
        }
        .field input:focus, .field textarea:focus { border-color: #6C3EF4; background: #fff; }
        .field textarea { min-height: 200px; line-height: 1.65; }

        .error-text { color: #FF6B6B; font-size: 12px; margin-top: 4px; display: block; }

        .btn-main {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #6C3EF4, #FF6B6B);
            color: #fff; border: none; border-radius: 12px;
            font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 15px;
            cursor: pointer; transition: opacity 0.2s; margin-top: 0.5rem;
        }
        .btn-main:hover { opacity: 0.9; }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="/my-notes" class="nav-brand">📝 NotesApp</a>
    <a href="/my-notes" class="btn-back">← Back to Notes</a>
</nav>

<div class="content">
    <div class="form-card">
        <h2>Create New Note ✨</h2>
        <p class="subtitle">Capture your thoughts</p>

        <form th:action="@{/my-notes/create}" th:object="${note}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="field">
                <label>Title</label>
                <input type="text" th:field="*{title}" placeholder="Give your note a title..."/>
                <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error-text"></span>
            </div>

            <div class="field">
                <label>Content</label>
                <textarea th:field="*{content}" placeholder="Write your note here..."></textarea>
                <span th:if="${#fields.hasErrors('content')}" th:errors="*{content}" class="error-text"></span>
            </div>

            <button type="submit" class="btn-main">Save Note →</button>
        </form>
    </div>
</div>

</body>
</html>
