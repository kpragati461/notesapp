<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login – NotesApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #6C3EF4 0%, #FF6B6B 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }
        .blob1 { position: fixed; width: 400px; height: 400px; background: rgba(255,255,255,0.07); border-radius: 50%; top: -120px; right: -120px; pointer-events: none; }
        .blob2 { position: fixed; width: 300px; height: 300px; background: rgba(255,217,61,0.12); border-radius: 50%; bottom: -80px; left: -60px; pointer-events: none; }
        .card {
            background: #fff;
            border-radius: 24px;
            padding: 2.5rem 2rem;
            width: 100%; max-width: 380px;
            position: relative; z-index: 1;
            margin: 1rem;
        }
        .app-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: #FFD93D; color: #5A3E00;
            font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 13px;
            padding: 5px 14px; border-radius: 20px; margin-bottom: 1.25rem;
        }
        h2 { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 26px; color: #1a1a2e; margin-bottom: 4px; }
        .subtitle { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
        .tab-row { display: flex; gap: 8px; margin-bottom: 1.75rem; }
        .tab {
            flex: 1; text-align: center; padding: 9px;
            border-radius: 10px; font-family: 'Poppins', sans-serif;
            font-size: 14px; font-weight: 600; text-decoration: none;
            transition: all 0.2s;
        }
        .tab.active { background: linear-gradient(135deg, #6C3EF4, #FF6B6B); color: #fff; }
        .tab.inactive { background: #f0ebff; color: #6C3EF4; }
        .field { margin-bottom: 1.1rem; }
        .field label { display: block; font-size: 12px; font-weight: 500; color: #555; margin-bottom: 5px; }
        .field input {
            width: 100%; padding: 11px 14px;
            border: 1.5px solid #e8e0ff; border-radius: 10px;
            font-family: 'Inter', sans-serif; font-size: 14px; color: #1a1a2e;
            background: #f8f5ff; outline: none; transition: all 0.2s;
        }
        .field input:focus { border-color: #6C3EF4; background: #fff; }
        .error-msg { background: #fff0f0; color: #c0392b; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 1rem; }
        .success-msg { background: #f0fff4; color: #27ae60; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 1rem; }
        .btn-main {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, #6C3EF4, #FF6B6B);
            color: #fff; border: none; border-radius: 10px;
            font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 15px;
            cursor: pointer; margin-top: 0.5rem; transition: opacity 0.2s;
        }
        .btn-main:hover { opacity: 0.9; }
        .link-row { text-align: center; margin-top: 1.25rem; font-size: 13px; color: #888; }
        .link-row a { color: #6C3EF4; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
<div class="blob1"></div>
<div class="blob2"></div>

<div class="card">
    <div class="app-badge">📝 NotesApp</div>
    <h2>Welcome back!</h2>
    <p class="subtitle">Sign in to your notes</p>

    <div class="tab-row">
        <a href="/login" class="tab active">Login</a>
        <a href="/register" class="tab inactive">Register</a>
    </div>

    <div th:if="${param.error}" class="error-msg">Invalid username or password.</div>
    <div th:if="${param.logout}" class="success-msg">You have been logged out.</div>

    <form action="/login" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="field">
            <label>Username</label>
            <input type="text" name="username" placeholder="your username" required/>
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-main">Sign In →</button>
    </form>

    <div class="link-row">No account? <a href="/register">Register here</a></div>
</div>
</body>
</html>
