<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

<h2>Create Account</h2>

<form action="/register" method="post">

    <input type="text"
           name="username"
           placeholder="Username">

    <br><br>

    <input type="email"
           name="email"
           placeholder="Email">

    <br><br>

    <input type="password"
           name="password"
           placeholder="Password">

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

</body>
</html>
