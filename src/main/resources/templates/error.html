<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error – NotesApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #F0EBFF; font-family: 'Inter', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
        }

        .navbar {
            background: linear-gradient(135deg, #6C3EF4, #FF6B6B);
            padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;
        }
        .nav-brand { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 20px; color: #fff; text-decoration: none; }

        .content {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 2rem;
        }

        .error-card {
            background: #fff; border-radius: 24px;
            padding: 3rem 2.5rem; max-width: 480px; width: 100%;
            text-align: center;
        }

        .error-emoji { font-size: 64px; margin-bottom: 1.25rem; }

        .error-card h2 {
            font-family: 'Poppins', sans-serif; font-weight: 700;
            font-size: 24px; color: #1a1a2e; margin-bottom: 0.75rem;
        }

        .error-msg {
            background: #fff0f0; color: #c0392b;
            border-radius: 12px; padding: 12px 16px;
            font-size: 14px; margin: 1.25rem 0;
            border-left: 4px solid #FF6B6B;
            text-align: left;
        }

        .error-card p {
            font-size: 14px; color: #aaa; margin-bottom: 1.75rem;
        }

        .btn-home {
            display: inline-block; padding: 13px 32px;
            background: linear-gradient(135deg, #6C3EF4, #FF6B6B);
            color: #fff; border: none; border-radius: 12px;
            font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 15px;
            cursor: pointer; text-decoration: none; transition: opacity 0.2s;
        }
        .btn-home:hover { opacity: 0.9; }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="/my-notes" class="nav-brand">📝 NotesApp</a>
</nav>

<div class="content">
    <div class="error-card">
        <div class="error-emoji">😵</div>
        <h2>Oops! Something went wrong.</h2>

        <div class="error-msg" th:text="${errorMessage}">
            An unexpected error occurred.
        </div>

        <p>Don't worry — your notes are safe. Head back and try again.</p>

        <a href="/my-notes" class="btn-home">← Back to My Notes</a>
    </div>
</div>

</body>
</html>
