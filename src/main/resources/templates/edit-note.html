<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Note</title>
</head>
<body>

<h2>Edit Note</h2>

<form th:action="@{/my-notes/edit/{id}(id=${note.id})}" th:object="${note}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <input type="text"
           th:field="*{title}"
           placeholder="Note Title">

    <!-- Title error -->
    <span th:if="${#fields.hasErrors('title')}"
          th:errors="*{title}"
          style="color:red;">
    </span>

    <br><br>

    <textarea th:field="*{content}"
              placeholder="Write your note here..."
              rows="6"
              cols="40"></textarea>

    <!-- Content error -->
    <span th:if="${#fields.hasErrors('content')}"
          th:errors="*{content}"
          style="color:red;">
    </span>

    <br><br>

    <button type="submit">Update Note</button>

</form>

<br>
<a href="/my-notes">← Back to My Notes</a>

</body>
</html>
