<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Notes – NotesApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #F0EBFF; font-family: 'Inter', sans-serif; min-height: 100vh; }

        .navbar {
            background: linear-gradient(135deg, #6C3EF4, #FF6B6B);
            padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-brand { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 20px; color: #fff; }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .btn-new {
            background: #FFD93D; color: #5A3E00;
            font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 14px;
            padding: 8px 18px; border-radius: 20px; border: none; cursor: pointer;
            text-decoration: none; transition: opacity 0.2s;
        }
        .btn-new:hover { opacity: 0.85; }
        .btn-logout {
            background: rgba(255,255,255,0.2); color: #fff;
            font-family: 'Inter', sans-serif; font-weight: 500; font-size: 13px;
            padding: 8px 16px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.35); cursor: pointer; transition: opacity 0.2s;
        }
        .btn-logout:hover { opacity: 0.85; }

        .content { padding: 2rem; max-width: 1100px; margin: 0 auto; }
        .page-title { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 22px; color: #1a1a2e; margin-bottom: 1.5rem; }

        .empty-state { text-align: center; padding: 4rem 2rem; color: #aaa; }
        .empty-state p { font-size: 15px; margin-bottom: 1rem; }

        .masonry { columns: 3; column-gap: 16px; }
        @media (max-width: 768px) { .masonry { columns: 2; } }
        @media (max-width: 480px) { .masonry { columns: 1; } }

        .note-card {
            break-inside: avoid; margin-bottom: 16px;
            border-radius: 18px; padding: 1.1rem 1.2rem;
            transition: transform 0.2s;
        }
        .note-card:hover { transform: translateY(-3px); }
        .note-card:nth-child(5n+1) { background: #fff0f7; }
        .note-card:nth-child(5n+2) { background: #f0ebff; }
        .note-card:nth-child(5n+3) { background: #fff8e1; }
        .note-card:nth-child(5n+4) { background: #e8f5e9; }
        .note-card:nth-child(5n+5) { background: #e3f2fd; }

        .note-title { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 15px; color: #1a1a2e; margin-bottom: 8px; }
        .note-content { font-size: 13px; color: #555; line-height: 1.65; margin-bottom: 10px; word-break: break-word; }
        .note-date { font-size: 11px; color: #aaa; margin-bottom: 12px; }
        .note-actions { display: flex; gap: 8px; }

        .btn-edit {
            flex: 1; padding: 7px; border-radius: 8px; border: none; cursor: pointer;
            background: rgba(108,62,244,0.1); color: #6C3EF4;
            font-family: 'Inter', sans-serif; font-weight: 500; font-size: 12px;
            text-decoration: none; text-align: center; transition: background 0.2s;
        }
        .btn-edit:hover { background: rgba(108,62,244,0.2); }
        .btn-delete {
            flex: 1; padding: 7px; border-radius: 8px; border: none; cursor: pointer;
            background: rgba(255,107,107,0.1); color: #FF6B6B;
            font-family: 'Inter', sans-serif; font-weight: 500; font-size: 12px;
            transition: background 0.2s;
        }
        .btn-delete:hover { background: rgba(255,107,107,0.2); }
        .search-bar {
    display: flex; gap: 10px; margin-bottom: 1.5rem;
}
.search-bar input {
    flex: 1; padding: 11px 18px;
    border: 1.5px solid #e8e0ff; border-radius: 20px;
    font-family: 'Inter', sans-serif; font-size: 14px; color: #1a1a2e;
    background: #fff; outline: none; transition: all 0.2s;
}
.search-bar input:focus { border-color: #6C3EF4; }
.btn-search {
    padding: 11px 22px;
    background: linear-gradient(135deg, #6C3EF4, #FF6B6B);
    color: #fff; border: none; border-radius: 20px;
    font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 14px;
    cursor: pointer; transition: opacity 0.2s;
}
.btn-search:hover { opacity: 0.9; }
.btn-clear {
    padding: 11px 18px;
    background: #fff; color: #6C3EF4;
    border: 1.5px solid #e8e0ff; border-radius: 20px;
    font-family: 'Inter', sans-serif; font-weight: 500; font-size: 14px;
    cursor: pointer; text-decoration: none; transition: all 0.2s;
}
.btn-clear:hover { border-color: #6C3EF4; }
.search-result-msg { font-size: 13px; color: #888; margin-bottom: 1rem; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">📝 NotesApp</div>
    <div class="nav-right">
        <a href="/my-notes/create" class="btn-new">+ New Note</a>
        <form action="/logout" method="post" style="margin:0;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout">Logout</button>
        </form>
    </div>
</nav>

<div class="content">
    <p class="page-title">My Notes ✨</p>
    <!-- Search Bar -->
<form action="/my-notes" method="get" class="search-bar">
    <input type="text"
           name="keyword"
           th:value="${keyword}"
           placeholder="Search notes by title..."/>
    <button type="submit" class="btn-search">Search</button>
    <a href="/my-notes" class="btn-clear">Clear</a>
</form>

<!-- Search result message -->
<p th:if="${keyword != null and !keyword.isEmpty()}"
   class="search-result-msg">
    Showing results for: <strong th:text="${keyword}"></strong>
</p>

    <div th:if="${notes.isEmpty()}" class="empty-state">
        <p>No notes yet — create your first one!</p>
        <a href="/my-notes/create" class="btn-new">+ New Note</a>
    </div>

    <div th:if="${!notes.isEmpty()}" class="masonry">
        <div th:each="note : ${notes}" class="note-card">
            <div class="note-title" th:text="${note.title}"></div>
            <div class="note-content" th:text="${note.content}"></div>
            <div class="note-date" th:text="${#temporals.format(note.createdAt, 'yyyy-MM-dd · HH:mm')}"></div>
            <div class="note-actions">
                <a th:href="@{/my-notes/edit/{id}(id=${note.id})}" class="btn-edit">✏️ Edit</a>
                <form th:action="@{/my-notes/delete/{id}(id=${note.id})}" method="post" style="flex:1; margin:0;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn-delete" onclick="return confirm('Delete this note?')">🗑 Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
